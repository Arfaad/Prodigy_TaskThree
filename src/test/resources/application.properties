# H2 In-Memory Database Configuration for Tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate/JPA Configuration for Tests
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Disable Flyway during unit testing to avoid H2 script dialect conflicts
spring.flyway.enabled=false

# JWT Security configuration for tests
app.security.jwt.secret=supersecretspringbootsecurityjwttokengenerationsecretkey32byteslong
app.security.jwt.expiration=86400000

logging.level.org.springframework.security=DEBUG

# Cache configuration for tests (uses simple ConcurrentMap Cache to avoid local Redis dependencies)
spring.cache.type=simple

